services:

  postgres:
    image: postgres:18
    container_name: course-postgres

    environment:
      POSTGRES_DB: course_management_db
      POSTGRES_USER: cms_user
      POSTGRES_PASSWORD: cms_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms_user -d course_management_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  admin:
    build:
      context: ./admin

    container_name: admin-service

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8081:8081"

  public:
    build:
      context: ./public

    container_name: public-service

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8082:8082"

volumes:
  postgres_data: